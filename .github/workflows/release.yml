name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux
          - os: windows-latest
            label: windows

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS deps
        run: pnpm install

      - name: Fix tauri.conf.json beforeDevCommand (use plain pnpm on CI)
        shell: bash
        run: |
          sed -i 's|\$HOME/.local/bin/pnpm|pnpm|g' src-tauri/tauri.conf.json

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: AeroChat ${{ github.ref_name }}
          releaseBody: |
            ## AeroChat ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Linux    | `.deb` or `.AppImage` |
            | Windows  | `.msi` or `.exe` |

            ### What's included
            - End-to-end encrypted direct messaging
            - Register / Login
            - Real-time message delivery
            - Frutiger Aero design

            > **First time?** See the [setup guide](https://github.com/AeroBoysInc/aero-chat-app#readme) to connect your own Supabase instance.
          releaseDraft: true
          prerelease: false
